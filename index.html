<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' data:; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self';" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StarHold</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <div class="brandBadge">SH</div>
          <div>
            <div class="brandTitle">STARHOLD</div>
            <div class="brandSub">SuperLuminal SSD Ship Crop + Damage Allocation Chart</div>
          </div>
        </div>
        <div class="toolbar">
          <div id="appVersion" class="appVersionBadge" title="StarHold version" aria-label="StarHold version"></div>
          <button id="btnSettings" class="iconButton" title="Choose default ship folder" aria-label="Choose default ship folder">&#9881;</button>
          <button id="btnRotateShips" class="secondaryButton" type="button">Rotate SSDs</button>
          <button id="btnManualMarkDamage" class="secondaryButton" type="button">Mark Damage</button>
          <button id="btnManualRemoveDamage" class="secondaryButton" type="button">Remove Damage</button>
          <button id="btnZoomSection" class="secondaryButton" type="button">Zoom Section</button>
          <button id="btnResetZoom" class="secondaryButton" type="button">Reset Zoom</button>
          <label class="toolbarDamageColorField" for="damageColorSelect">
            <span class="toolbarDamageColorLabel">Damage Color</span>
            <div class="selectFieldShell">
              <select id="damageColorSelect" class="toolbarDamageColorSelect" aria-label="Damage overlay color">
                <option value="classic">Classic</option>
                <option value="crimson">Crimson</option>
                <option value="orange">Orange</option>
                <option value="gold">Gold</option>
                <option value="emerald">Emerald</option>
                <option value="cyan">Cyan</option>
                <option value="violet">Violet</option>
              </select>
              <span class="dropdownChevron" aria-hidden="true"></span>
            </div>
          </label>
          <button id="btnAssignDamage">Assign Damage</button>
          <button id="btnOpenShip">Open SuperLuminal Ship</button>
        </div>
      </header>

      <main class="layout">
        <section class="panel shipPanel">
          <div class="panelHeader">
            <div class="panelTitle">Ship Area</div>
            <div id="manualDamageHint" class="panelHint">Manual edit off</div>
          </div>

          <div class="shipSwitcherRow">
            <select id="shipSelect" class="shipSelect" aria-label="Loaded ships" disabled>
              <option value="">No ships loaded</option>
            </select>
            <button id="btnCloseShip" class="iconButton secondaryButton shipCloseBtn" type="button" aria-label="Close current ship" title="Close current ship" disabled>&times;</button>
            <div id="shipCount" class="shipSwitcherMeta">0 loaded</div>
          </div>

          <div class="canvasWrap">
            <canvas id="shipCanvas"></canvas>
            <div id="canvasEmpty" class="canvasEmpty">Open a SuperLuminal ship folder to display the ship area.</div>
          </div>
        </section>

        <section class="panel chartPanel">
          <div class="panelHeader">
            <div class="panelTitle">Damage Allocation Chart</div>
            <div class="panelHint">Static reference table</div>
          </div>
          <div class="tableWrap">
            <table id="damageChartTable" class="damageTable"></table>
          </div>
          <div id="automaticDacAudit" class="dacAuditPanel hidden"></div>
        </section>
      </main>
    </div>

    <div id="weaponSelectOverlay" class="modalOverlay hidden" aria-hidden="true">
      <div class="modalCard assignWindowCard">
        <div class="modalHeader">
          <div id="weaponSelectTitle" class="modalTitle">Choose Weapon Hit</div>
          <button id="btnWeaponSelectClose" class="iconButton modalCloseBtn" type="button" aria-label="Cancel weapon selection">&times;</button>
        </div>
        <div class="modalBody assignModePromptBody">
          <div id="weaponSelectLead" class="assignModePromptLead">Select which box is hit.</div>
          <div id="weaponSelectList" class="weaponSelectList"></div>
        </div>
        <div class="modalActions assignModePromptActions">
          <button id="btnWeaponSelectSkip" class="secondaryButton hidden" type="button">Skip</button>
          <button id="btnWeaponSelectCancel" class="secondaryButton" type="button">Cancel</button>
        </div>
      </div>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
